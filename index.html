<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Auth Test</title>
<script src="https://accounts.google.com/gsi/client"></script>
</head>
<body style="font-family:sans-serif;padding:40px;max-width:500px;margin:auto">
  <h2>Google Sign-In Test</h2>
  <p style="color:#666;margin-bottom:20px">This tests if Google OAuth works on your domain.</p>

  <div id="g_id_onload"
    data-client_id="519974257344-5u0bjm2sdctrnlq6b1oflsvesgn291fc.apps.googleusercontent.com"
    data-callback="onSignIn"
    data-auto_prompt="false">
  </div>
  <div class="g_id_signin"
    data-type="standard"
    data-size="large"
    data-theme="filled_blue"
    data-text="sign_in_with"
    data-shape="rectangular"
    data-width="300">
  </div>

  <div id="result" style="margin-top:24px;padding:16px;border-radius:8px;display:none"></div>

  <script>
  function onSignIn(response) {
    try {
      const parts = response.credential.split('.');
      const payload = JSON.parse(atob(parts[1].replace(/-/g,'+').replace(/_/g,'/')));
      const el = document.getElementById('result');
      el.style.display = 'block';
      el.style.background = '#f0fdf4';
      el.style.border = '1px solid #86efac';
      el.innerHTML = '<strong style="color:#15803d">✅ Sign-in worked!</strong><br><br>' +
        '<b>Email:</b> ' + payload.email + '<br>' +
        '<b>Name:</b> ' + payload.name + '<br>' +
        '<b>Domain:</b> ' + payload.email.split("@")[1];
    } catch(e) {
      const el = document.getElementById('result');
      el.style.display = 'block';
      el.style.background = '#fef2f2';
      el.style.border = '1px solid #fca5a5';
      el.innerHTML = '<strong style="color:#dc2626">❌ Error parsing token:</strong><br>' + e.message;
    }
  }

  window.onload = function() {
    setTimeout(function() {
      const btn = document.querySelector('.g_id_signin iframe');
      if (!btn) {
        document.getElementById('result').style.display = 'block';
        document.getElementById('result').style.background = '#fffbeb';
        document.getElementById('result').style.border = '1px solid #fde68a';
        document.getElementById('result').innerHTML = '<strong style="color:#92400e">⚠️ Google button did not render.</strong><br>This means:<br>1. The Client ID is wrong, OR<br>2. This domain is not in Authorized JavaScript Origins<br><br>Go to Google Cloud Console → APIs & Services → Credentials → your OAuth Client → add <b>' + location.origin + '</b> to Authorized JavaScript Origins';
      }
    }, 3000);
  };
  </script>
</body>
</html>
